name: OzempicAI

options:
  bundleIdPrefix: com.mihirpatel
  deploymentTarget:
    iOS: "16.0"
    macOS: "13.0"
  xcodeVersion: "15.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  OzempicAI:
    type: application
    platform: iOS
    sources:
      - path: OzempicAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihirpatel.OzempicAI
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: OzempicAI/App/Info.plist
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: OzempicAI/App/OzempicAI.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  OzempicAIMac:
    type: application
    platform: macOS
    sources:
      - path: OzempicAI/Models
      - path: OzempicAI/ViewModels
      - path: OzempicAI/Services
        excludes:
          - HealthKitService.swift
      - path: OzempicAI/Utilities
      - path: OzempicAIMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mihirpatel.OzempicAI.Mac
        PRODUCT_NAME: OzempicAI
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        INFOPLIST_FILE: OzempicAIMac/Info.plist
        DEVELOPMENT_TEAM: ""
    dependencies:
      - package: Supabase
        product: Supabase
    entitlements:
      path: OzempicAIMac/OzempicAIMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

  OzempicAIMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OzempicAIMacTests
    dependencies:
      - target: OzempicAIMac
        embed: false
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OzempicAI.app/Contents/MacOS/OzempicAI"
        BUNDLE_LOADER: "$(TEST_HOST)"
